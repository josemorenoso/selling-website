<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demos — Luis Moreno</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/demos/shared.css">
</head>
<body>
  <div class="pin-container" id="pin-screen">
    <div class="pin-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2E7BF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <a href="/" class="demo-logo">Luis<span>.</span>Moreno</a>
    <h1 class="pin-title">Acceso Demos</h1>
    <p class="pin-subtitle">Ingresa el PIN para ver las demos en vivo</p>
    <input type="password" id="pin" class="pin-input" maxlength="4" placeholder="····" autocomplete="off" autofocus>
    <div class="pin-error" id="pin-error">PIN incorrecto. Intenta de nuevo.</div>
    <button class="btn-submit" onclick="checkPin()" id="pin-btn">Acceder →</button>
  </div>

  <script>
    const DEMO_PIN = "0000"; // ← Luis: cambia este valor por tu PIN real

    const params = new URLSearchParams(window.location.search);
    const tool = params.get('tool');

    // Si ya tiene acceso y viene con ?tool= → redirigir directo
    if (sessionStorage.getItem('demo_access') === 'true' && tool) {
      window.location.href = '/demos/' + tool + '.html';
    }

    // Enter key para submit
    document.getElementById('pin').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPin();
    });

    function checkPin() {
      var input = document.getElementById('pin').value;
      var errorEl = document.getElementById('pin-error');

      if (input === DEMO_PIN) {
        sessionStorage.setItem('demo_access', 'true');
        if (tool) {
          window.location.href = '/demos/' + tool + '.html';
        } else {
          // Sin tool específica → mostrar menú de demos
          showDemoMenu();
        }
      } else {
        errorEl.classList.add('visible');
        document.getElementById('pin').value = '';
        document.getElementById('pin').focus();
        setTimeout(function() { errorEl.classList.remove('visible'); }, 3000);
      }
    }

    function showDemoMenu() {
      var container = document.getElementById('pin-screen');
      container.innerHTML = '<a href="/" class="demo-logo" style="margin-bottom:2rem;">Luis<span>.</span>Moreno</a>'
        + '<h1 class="pin-title" style="margin-bottom:0.5rem;">Demos en Vivo</h1>'
        + '<p class="pin-subtitle" style="margin-bottom:2rem;">Selecciona una herramienta para ver la demo</p>'
        + '<div style="display:flex;flex-direction:column;gap:0.75rem;width:100%;">'
        + '<a href="/demos/restaurantes.html" style="display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;border-radius:0.75rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);text-decoration:none;color:#F0F5FF;transition:border-color 0.2s,background 0.2s;" onmouseover="this.style.borderColor=\'rgba(46,123,246,0.3)\';this.style.background=\'rgba(46,123,246,0.04)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.08)\';this.style.background=\'rgba(255,255,255,0.02)\'">'
        + '<span style="font-size:1.5rem;">🍽️</span><div><div style="font-weight:600;font-size:0.9rem;">Fidelización para Restaurantes</div><div style="font-size:0.75rem;color:#8A9BB0;">Dashboard en vivo</div></div></a>'
        + '<a href="/demos/hoteles.html" style="display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;border-radius:0.75rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);text-decoration:none;color:#F0F5FF;transition:border-color 0.2s,background 0.2s;" onmouseover="this.style.borderColor=\'rgba(46,123,246,0.3)\';this.style.background=\'rgba(46,123,246,0.04)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.08)\';this.style.background=\'rgba(255,255,255,0.02)\'">'
        + '<span style="font-size:1.5rem;">🏨</span><div><div style="font-weight:600;font-size:0.9rem;">Agente IA de Reservas Hoteleras</div><div style="font-size:0.75rem;color:#8A9BB0;">Chat IA en vivo</div></div></a>'
        + '<a href="/demos/prospectos.html" style="display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;border-radius:0.75rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);text-decoration:none;color:#F0F5FF;transition:border-color 0.2s,background 0.2s;" onmouseover="this.style.borderColor=\'rgba(46,123,246,0.3)\';this.style.background=\'rgba(46,123,246,0.04)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.08)\';this.style.background=\'rgba(255,255,255,0.02)\'">'
        + '<span style="font-size:1.5rem;">🎯</span><div><div style="font-weight:600;font-size:0.9rem;">Captador Automático de Clientes</div><div style="font-size:0.75rem;color:#8A9BB0;">Formulario → Email</div></div></a>'
        + '<a href="/demos/reporte.html" style="display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;border-radius:0.75rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);text-decoration:none;color:#F0F5FF;transition:border-color 0.2s,background 0.2s;" onmouseover="this.style.borderColor=\'rgba(46,123,246,0.3)\';this.style.background=\'rgba(46,123,246,0.04)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.08)\';this.style.background=\'rgba(255,255,255,0.02)\'">'
        + '<span style="font-size:1.5rem;">📊</span><div><div style="font-weight:600;font-size:0.9rem;">Reporte Semanal de Negocio</div><div style="font-size:0.75rem;color:#8A9BB0;">Reporte → Email</div></div></a>'
        + '<a href="/demos/presupuestos.html" style="display:flex;align-items:center;gap:0.75rem;padding:1rem 1.25rem;border-radius:0.75rem;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);text-decoration:none;color:#F0F5FF;transition:border-color 0.2s,background 0.2s;" onmouseover="this.style.borderColor=\'rgba(46,123,246,0.3)\';this.style.background=\'rgba(46,123,246,0.04)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.08)\';this.style.background=\'rgba(255,255,255,0.02)\'">'
        + '<span style="font-size:1.5rem;">💼</span><div><div style="font-weight:600;font-size:0.9rem;">Cotizador Profesional Instantáneo</div><div style="font-size:0.75rem;color:#8A9BB0;">Cotización → 2 Emails</div></div></a>'
        + '</div>'
        + '<a href="/" style="margin-top:2rem;font-size:0.85rem;color:#8A9BB0;text-decoration:none;">← Volver al sitio</a>';
    }
  </script>
</body>
</html>
